<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="blue1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="blue2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle hex grid pattern -->
  <g opacity="0.04" stroke="#3b82f6" stroke-width="0.5" fill="none">
    <polygon points="600,50 640,73 640,119 600,142 560,119 560,73"/>
    <polygon points="600,142 640,165 640,211 600,234 560,211 560,165"/>
    <polygon points="680,96 720,119 720,165 680,188 640,165 640,119"/>
    <polygon points="520,96 560,119 560,165 520,188 480,165 480,119"/>
    <polygon points="680,188 720,211 720,257 680,280 640,257 640,211"/>
    <polygon points="520,188 560,211 560,257 520,280 480,257 480,211"/>
    <polygon points="760,142 800,165 800,211 760,234 720,211 720,165"/>
    <polygon points="440,142 480,165 480,211 440,234 400,211 400,165"/>
  </g>

  <!-- Connection lines (behind people) -->
  <g stroke="#3b82f6" stroke-width="1.5" opacity="0.2">
    <!-- From center to surrounding nodes -->
    <line x1="600" y1="300" x2="380" y2="180"/>
    <line x1="600" y1="300" x2="820" y2="180"/>
    <line x1="600" y1="300" x2="300" y2="350"/>
    <line x1="600" y1="300" x2="900" y2="350"/>
    <line x1="600" y1="300" x2="420" y2="480"/>
    <line x1="600" y1="300" x2="780" y2="480"/>
    <!-- Inter-node connections -->
    <line x1="380" y1="180" x2="300" y2="350" stroke-dasharray="4 4" opacity="0.5"/>
    <line x1="820" y1="180" x2="900" y2="350" stroke-dasharray="4 4" opacity="0.5"/>
    <line x1="300" y1="350" x2="420" y2="480" stroke-dasharray="4 4" opacity="0.5"/>
    <line x1="900" y1="350" x2="780" y2="480" stroke-dasharray="4 4" opacity="0.5"/>
    <line x1="380" y1="180" x2="820" y2="180" stroke-dasharray="4 4" opacity="0.3"/>
    <line x1="420" y1="480" x2="780" y2="480" stroke-dasharray="4 4" opacity="0.3"/>
  </g>

  <!-- Radiating circles from center -->
  <circle cx="600" cy="300" r="80" fill="none" stroke="#3b82f6" stroke-width="0.8" opacity="0.1"/>
  <circle cx="600" cy="300" r="160" fill="none" stroke="#3b82f6" stroke-width="0.6" opacity="0.07"/>
  <circle cx="600" cy="300" r="240" fill="none" stroke="#3b82f6" stroke-width="0.4" opacity="0.05"/>

  <!-- Central person (larger) -->
  <g transform="translate(600, 270)" filter="url(#glow)">
    <circle cx="0" cy="-20" r="22" fill="#3b82f6"/>
    <path d="M -28 30 Q -28 5, 0 5 Q 28 5, 28 30 L 28 45 Q 28 50, 23 50 L -23 50 Q -28 50, -28 45 Z" fill="#3b82f6"/>
    <!-- Highlight -->
    <circle cx="0" cy="-20" r="18" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Person top-left -->
  <g transform="translate(380, 155)">
    <circle cx="0" cy="-15" r="16" fill="#3b82f6" opacity="0.7"/>
    <path d="M -20 18 Q -20 0, 0 0 Q 20 0, 20 18 L 20 30 Q 20 34, 16 34 L -16 34 Q -20 34, -20 30 Z" fill="#3b82f6" opacity="0.7"/>
  </g>

  <!-- Person top-right -->
  <g transform="translate(820, 155)">
    <circle cx="0" cy="-15" r="16" fill="#3b82f6" opacity="0.7"/>
    <path d="M -20 18 Q -20 0, 0 0 Q 20 0, 20 18 L 20 30 Q 20 34, 16 34 L -16 34 Q -20 34, -20 30 Z" fill="#3b82f6" opacity="0.7"/>
  </g>

  <!-- Person mid-left -->
  <g transform="translate(300, 325)">
    <circle cx="0" cy="-15" r="14" fill="#3b82f6" opacity="0.55"/>
    <path d="M -18 15 Q -18 0, 0 0 Q 18 0, 18 15 L 18 28 Q 18 32, 14 32 L -14 32 Q -18 32, -18 28 Z" fill="#3b82f6" opacity="0.55"/>
  </g>

  <!-- Person mid-right -->
  <g transform="translate(900, 325)">
    <circle cx="0" cy="-15" r="14" fill="#3b82f6" opacity="0.55"/>
    <path d="M -18 15 Q -18 0, 0 0 Q 18 0, 18 15 L 18 28 Q 18 32, 14 32 L -14 32 Q -18 32, -18 28 Z" fill="#3b82f6" opacity="0.55"/>
  </g>

  <!-- Person bottom-left -->
  <g transform="translate(420, 455)">
    <circle cx="0" cy="-15" r="14" fill="#3b82f6" opacity="0.45"/>
    <path d="M -18 15 Q -18 0, 0 0 Q 18 0, 18 15 L 18 28 Q 18 32, 14 32 L -14 32 Q -18 32, -18 28 Z" fill="#3b82f6" opacity="0.45"/>
  </g>

  <!-- Person bottom-right -->
  <g transform="translate(780, 455)">
    <circle cx="0" cy="-15" r="14" fill="#3b82f6" opacity="0.45"/>
    <path d="M -18 15 Q -18 0, 0 0 Q 18 0, 18 15 L 18 28 Q 18 32, 14 32 L -14 32 Q -18 32, -18 28 Z" fill="#3b82f6" opacity="0.45"/>
  </g>

  <!-- Org chart structure (top-left area) -->
  <g transform="translate(60, 80)" opacity="0.35">
    <rect width="100" height="40" rx="6" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="50" y1="40" x2="50" y2="60" stroke="#3b82f6" stroke-width="1"/>
    <line x1="20" y1="60" x2="80" y2="60" stroke="#3b82f6" stroke-width="1"/>
    <line x1="20" y1="60" x2="20" y2="75" stroke="#3b82f6" stroke-width="1"/>
    <line x1="80" y1="60" x2="80" y2="75" stroke="#3b82f6" stroke-width="1"/>
    <rect x="-10" y="75" width="60" height="30" rx="4" fill="none" stroke="#3b82f6" stroke-width="1"/>
    <rect x="50" y="75" width="60" height="30" rx="4" fill="none" stroke="#3b82f6" stroke-width="1"/>
  </g>

  <!-- Org chart structure (top-right area) -->
  <g transform="translate(1020, 60)" opacity="0.3">
    <rect width="80" height="35" rx="6" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="40" y1="35" x2="40" y2="50" stroke="#3b82f6" stroke-width="1"/>
    <line x1="10" y1="50" x2="70" y2="50" stroke="#3b82f6" stroke-width="1"/>
    <line x1="10" y1="50" x2="10" y2="65" stroke="#3b82f6" stroke-width="1"/>
    <line x1="40" y1="50" x2="40" y2="65" stroke="#3b82f6" stroke-width="1"/>
    <line x1="70" y1="50" x2="70" y2="65" stroke="#3b82f6" stroke-width="1"/>
    <rect x="-15" y="65" width="50" height="25" rx="4" fill="none" stroke="#3b82f6" stroke-width="1"/>
    <rect x="15" y="65" width="50" height="25" rx="4" fill="none" stroke="#3b82f6" stroke-width="1"/>
    <rect x="45" y="65" width="50" height="25" rx="4" fill="none" stroke="#3b82f6" stroke-width="1"/>
  </g>

  <!-- Connection node dots (on the lines) -->
  <g fill="#3b82f6">
    <circle cx="490" cy="240" r="3" opacity="0.4"/>
    <circle cx="710" cy="240" r="3" opacity="0.4"/>
    <circle cx="450" cy="325" r="3" opacity="0.3"/>
    <circle cx="750" cy="325" r="3" opacity="0.3"/>
    <circle cx="510" cy="390" r="3" opacity="0.3"/>
    <circle cx="690" cy="390" r="3" opacity="0.3"/>
  </g>

  <!-- Small floating people silhouettes (outer ring) -->
  <g opacity="0.2">
    <g transform="translate(150, 450)">
      <circle cx="0" cy="-8" r="8" fill="#3b82f6"/>
      <path d="M -10 10 Q -10 0, 0 0 Q 10 0, 10 10 L 10 18 Q 10 20, 8 20 L -8 20 Q -10 20, -10 18 Z" fill="#3b82f6"/>
    </g>
    <g transform="translate(1050, 450)">
      <circle cx="0" cy="-8" r="8" fill="#3b82f6"/>
      <path d="M -10 10 Q -10 0, 0 0 Q 10 0, 10 10 L 10 18 Q 10 20, 8 20 L -8 20 Q -10 20, -10 18 Z" fill="#3b82f6"/>
    </g>
    <g transform="translate(200, 250)">
      <circle cx="0" cy="-8" r="8" fill="#3b82f6"/>
      <path d="M -10 10 Q -10 0, 0 0 Q 10 0, 10 10 L 10 18 Q 10 20, 8 20 L -8 20 Q -10 20, -10 18 Z" fill="#3b82f6"/>
    </g>
    <g transform="translate(1000, 250)">
      <circle cx="0" cy="-8" r="8" fill="#3b82f6"/>
      <path d="M -10 10 Q -10 0, 0 0 Q 10 0, 10 10 L 10 18 Q 10 20, 8 20 L -8 20 Q -10 20, -10 18 Z" fill="#3b82f6"/>
    </g>
  </g>

  <!-- Dashed connection lines to outer ring -->
  <g stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="3 5" opacity="0.1">
    <line x1="300" y1="350" x2="160" y2="450"/>
    <line x1="900" y1="350" x2="1050" y2="450"/>
    <line x1="300" y1="350" x2="210" y2="250"/>
    <line x1="900" y1="350" x2="1000" y2="250"/>
  </g>

  <!-- Green accent pulse at center -->
  <circle cx="600" cy="300" r="50" fill="#16a34a" opacity="0.04"/>
  <circle cx="600" cy="300" r="35" fill="#16a34a" opacity="0.06"/>

  <!-- CVpass branding -->
  <text x="1140" y="610" text-anchor="end" fill="#3b82f6" font-family="system-ui,sans-serif" font-size="16" font-weight="600" opacity="0.3">CVpass</text>

  <!-- Corner accents -->
  <rect x="0" y="0" width="4" height="60" fill="#3b82f6" opacity="0.4"/>
  <rect x="0" y="0" width="60" height="4" fill="#3b82f6" opacity="0.4"/>
  <rect x="1196" y="570" width="4" height="60" fill="#3b82f6" opacity="0.4"/>
  <rect x="1140" y="626" width="60" height="4" fill="#3b82f6" opacity="0.4"/>
</svg>