<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0c1322"/>
    </linearGradient>
    <linearGradient id="terminal4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="cyan4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow4">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#06b6d4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg4)"/>

  <!-- Faint binary/hex in background -->
  <g font-family="'Courier New', monospace" font-size="14" fill="#06b6d4" opacity="0.04">
    <text x="30" y="40">01001100 11010010 00110101</text>
    <text x="350" y="70">0x4A 0xFF 0x2B 0x9C 0x01</text>
    <text x="100" y="100">10110011 01001101 11100010</text>
    <text x="600" y="45">01100001 10101010 00011101</text>
    <text x="800" y="80">0xDE 0xAD 0xBE 0xEF 0x42</text>
    <text x="50" y="560">11001010 01010101 10110110</text>
    <text x="400" y="590">0x16 0xA3 0x4A 0x06 0xB6</text>
    <text x="750" y="570">01110111 10001100 01011010</text>
    <text x="900" y="600">0xCA 0xFE 0xBA 0xBE</text>
    <text x="200" y="520">10101010 11001100 01010011</text>
    <text x="950" y="530">01101001 00110110 10100101</text>
    <text x="30" y="300">0xFF</text>
    <text x="1120" y="250">0x00</text>
    <text x="60" y="450">1010</text>
    <text x="1100" y="400">0110</text>
  </g>

  <!-- Terminal window -->
  <g filter="url(#shadow4)" transform="translate(280, 100)">
    <!-- Terminal frame -->
    <rect width="640" height="430" rx="12" fill="url(#terminal4)" stroke="#334155" stroke-width="1"/>

    <!-- Title bar -->
    <rect width="640" height="36" rx="12" fill="#1e293b"/>
    <rect y="24" width="640" height="12" fill="#1e293b"/>
    <!-- Traffic lights -->
    <circle cx="20" cy="18" r="6" fill="#ef4444" opacity="0.8"/>
    <circle cx="40" cy="18" r="6" fill="#f59e0b" opacity="0.8"/>
    <circle cx="60" cy="18" r="6" fill="#22c55e" opacity="0.8"/>
    <!-- Title -->
    <text x="320" y="23" font-family="'Courier New', monospace" font-size="13" fill="#64748b" text-anchor="middle">cv-developer.tsx</text>

    <!-- Code lines -->
    <g font-family="'Courier New', monospace" font-size="14">
      <!-- Line numbers -->
      <g fill="#475569" opacity="0.5">
        <text x="20" y="65">1</text>
        <text x="20" y="85">2</text>
        <text x="20" y="105">3</text>
        <text x="20" y="125">4</text>
        <text x="20" y="145">5</text>
        <text x="20" y="165">6</text>
        <text x="20" y="185">7</text>
        <text x="20" y="205">8</text>
        <text x="20" y="225">9</text>
        <text x="14" y="245">10</text>
        <text x="14" y="265">11</text>
        <text x="14" y="285">12</text>
        <text x="14" y="305">13</text>
        <text x="14" y="325">14</text>
        <text x="14" y="345">15</text>
        <text x="14" y="365">16</text>
        <text x="14" y="385">17</text>
        <text x="14" y="405">18</text>
      </g>

      <!-- Code content -->
      <text x="50" y="65"><tspan fill="#c084fc">import</tspan><tspan fill="#e2e8f0"> { </tspan><tspan fill="#06b6d4">Skills</tspan><tspan fill="#e2e8f0"> } </tspan><tspan fill="#c084fc">from</tspan><tspan fill="#a5d6a7"> 'developer'</tspan></text>
      <text x="50" y="85" fill="#475569">// Build an ATS-optimized CV</text>
      <text x="50" y="105"><tspan fill="#c084fc">const</tspan><tspan fill="#06b6d4"> developer</tspan><tspan fill="#e2e8f0"> = {</tspan></text>
      <text x="50" y="125"><tspan fill="#e2e8f0">  name: </tspan><tspan fill="#a5d6a7">'Full Stack'</tspan><tspan fill="#e2e8f0">,</tspan></text>
      <text x="50" y="145"><tspan fill="#e2e8f0">  skills: [</tspan></text>
      <text x="50" y="165"><tspan fill="#a5d6a7">    'React'</tspan><tspan fill="#e2e8f0">,</tspan><tspan fill="#a5d6a7"> 'Node'</tspan><tspan fill="#e2e8f0">,</tspan></text>
      <text x="50" y="185"><tspan fill="#a5d6a7">    'TypeScript'</tspan><tspan fill="#e2e8f0">,</tspan></text>
      <text x="50" y="205"><tspan fill="#a5d6a7">    'Python'</tspan></text>
      <text x="50" y="225"><tspan fill="#e2e8f0">  ],</tspan></text>
      <text x="50" y="245"><tspan fill="#e2e8f0">  atsScore: </tspan><tspan fill="#06b6d4">95</tspan><tspan fill="#e2e8f0">,</tspan></text>
      <text x="50" y="265"><tspan fill="#e2e8f0">  experience: </tspan><tspan fill="#06b6d4">5</tspan><tspan fill="#e2e8f0">,</tspan></text>
      <text x="50" y="285"><tspan fill="#e2e8f0">  optimized: </tspan><tspan fill="#f59e0b">true</tspan></text>
      <text x="50" y="305"><tspan fill="#e2e8f0">}</tspan></text>
      <text x="50" y="325" fill="#e2e8f0"> </text>
      <text x="50" y="345"><tspan fill="#c084fc">export</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#c084fc">default</tspan><tspan fill="#e2e8f0"> developer</tspan></text>
      <text x="50" y="365" fill="#e2e8f0"> </text>
      <text x="50" y="385"><tspan fill="#475569">// Score: </tspan><tspan fill="#22c55e">PASS</tspan><tspan fill="#475569"> ✓</tspan></text>

      <!-- Cursor blink -->
      <rect x="50" y="396" width="9" height="16" fill="#06b6d4" opacity="0.7"/>
    </g>
  </g>

  <!-- Large code brackets overlay -->
  <g filter="url(#glow4)">
    <!-- Left bracket -->
    <text x="160" y="380" font-family="'Courier New', monospace" font-size="200" font-weight="300" fill="#06b6d4" opacity="0.08">{</text>
    <!-- Right bracket -->
    <text x="940" y="380" font-family="'Courier New', monospace" font-size="200" font-weight="300" fill="#06b6d4" opacity="0.08">}</text>
  </g>

  <!-- Subtle connecting dots -->
  <g fill="#06b6d4">
    <circle cx="100" cy="200" r="2" opacity="0.2"/>
    <circle cx="1100" cy="180" r="2.5" opacity="0.25"/>
    <circle cx="150" cy="450" r="1.5" opacity="0.15"/>
    <circle cx="1060" cy="470" r="2" opacity="0.2"/>
    <circle cx="200" cy="100" r="2" opacity="0.15"/>
    <circle cx="1000" cy="550" r="2.5" opacity="0.18"/>
  </g>

  <!-- CVpass branding -->
  <text x="1140" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#06b6d4" opacity="0.25" text-anchor="end" letter-spacing="2">CVpass</text>
</svg>