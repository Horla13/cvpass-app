    <line x1="640" y1="138" x2="820" y2="218"/>
    <line x1="425" y1="236" x2="510" y2="260"/>
    <line x1="690" y1="280" x2="770" y2="396"/>
    <line x1="530" y1="340" x2="465" y2="498"/>
