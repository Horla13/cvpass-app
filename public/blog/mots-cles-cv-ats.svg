<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg4" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7e22ce"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="greenTag" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow4">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg4)"/>
  <!-- Subtle pattern -->
  <g opacity="0.03">
    <pattern id="cross4" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <line x1="15" y1="12" x2="15" y2="18" stroke="white" stroke-width="0.5"/>
      <line x1="12" y1="15" x2="18" y2="15" stroke="white" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#cross4)"/>
  </g>
  <!-- Background accents -->
  <circle cx="600" cy="315" r="250" fill="#7e22ce" opacity="0.03"/>
  <circle cx="600" cy="315" r="180" fill="#7e22ce" opacity="0.03"/>
  <!-- Magnifying glass - center -->
  <g filter="url(#glow4)" transform="translate(600, 300)">
    <!-- Glass circle -->
    <circle cx="0" cy="-20" r="90" fill="none" stroke="url(#purpleGrad)" stroke-width="4"/>
    <circle cx="0" cy="-20" r="85" fill="#7e22ce" opacity="0.06"/>
    <!-- Handle -->
    <line x1="63" y1="45" x2="115" y2="97" stroke="url(#purpleGrad)" stroke-width="8" stroke-linecap="round"/>
    <!-- Inner reflection arc -->
    <path d="M-50,-60 A60,60 0 0,1 30,-75" fill="none" stroke="white" stroke-width="1.5" opacity="0.1"/>
  </g>
  <!-- Highlighted green keyword tags -->
  <g filter="url(#softGlow4)">
    <g transform="translate(180, 160)">
      <rect x="0" y="0" width="130" height="36" rx="18" fill="#16a34a" opacity="0.2" stroke="#16a34a" stroke-width="1.5"/>
      <text x="65" y="23" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#4ade80">management</text>
    </g>
    <g transform="translate(820, 200)">
      <rect x="0" y="0" width="105" height="36" rx="18" fill="#16a34a" opacity="0.2" stroke="#16a34a" stroke-width="1.5"/>
      <text x="52" y="23" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#4ade80">Python</text>
