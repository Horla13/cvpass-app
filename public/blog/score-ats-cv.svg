<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="arcTrack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle grid dots -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="white"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>
  <!-- Background decorative circles -->
  <circle cx="200" cy="150" r="80" fill="#16a34a" opacity="0.04"/>
  <circle cx="1000" cy="480" r="120" fill="#16a34a" opacity="0.03"/>
  <circle cx="900" cy="100" r="60" fill="#22d3ee" opacity="0.04"/>
  <!-- Main gauge - track -->
  <circle cx="600" cy="315" r="180" fill="none" stroke="url(#arcTrack)" stroke-width="24" stroke-linecap="round" opacity="0.5"/>
  <!-- Main gauge - green arc (85%) -->
  <circle cx="600" cy="315" r="180" fill="none" stroke="url(#arcGrad)" stroke-width="24" stroke-linecap="round"
    stroke-dasharray="962 1131" stroke-dashoffset="283" filter="url(#glow)" transform="rotate(-90 600 315)"/>
  <!-- Inner ring -->
  <circle cx="600" cy="315" r="150" fill="none" stroke="#1e293b" stroke-width="2" opacity="0.5"/>
  <circle cx="600" cy="315" r="210" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.3"/>
  <!-- Score text -->
  <text x="600" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="700" fill="white">85</text>
  <text x="600" y="345" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#94a3b8" letter-spacing="4">SCORE ATS</text>
  <!-- Floating checkmarks -->
  <g filter="url(#softGlow)" opacity="0.9">
    <g transform="translate(320, 180)">
      <circle r="24" fill="#16a34a" opacity="0.15"/>
      <path d="M-8,0 L-3,5 L8,-6" stroke="#16a34a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(260, 350)">
      <circle r="18" fill="#16a34a" opacity="0.12"/>
      <path d="M-6,0 L-2,4 L6,-5" stroke="#16a34a" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(880, 200)">
      <circle r="20" fill="#16a34a" opacity="0.15"/>
      <path d="M-7,0 L-2,5 L7,-5" stroke="#16a34a" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(940, 420)">
      <circle r="16" fill="#16a34a" opacity="0.12"/>
      <path d="M-5,0 L-2,3 L5,-4" stroke="#16a34a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  <!-- Floating stars -->
  <g filter="url(#softGlow)">
    <polygon points="350,450 354,462 367,462 357,470 360,482 350,474 340,482 343,470 333,462 346,462" fill="#fbbf24" opacity="0.5"/>
    <polygon points="850,140 853,148 861,148 854,153 857,161 850,156 843,161 846,153 839,148 847,148" fill="#fbbf24" opacity="0.6"/>
    <polygon points="180,480 183,488 191,488 185,493 187,501 180,496 173,501 176,493 169,488 177,488" fill="#fbbf24" opacity="0.35"/>
    <polygon points="1020,300 1023,308 1031,308 1025,313 1027,321 1020,316 1013,321 1016,313 1009,308 1017,308" fill="#fbbf24" opacity="0.4"/>
  </g>
  <!-- Small decorative gauge ticks -->
  <g transform="translate(600, 315)" opacity="0.2">
    <line x1="0" y1="-195" x2="0" y2="-205" stroke="white" stroke-width="1.5" transform="rotate(0)"/>
    <line x1="0" y1="-195" x2="0" y2="-205" stroke="white" stroke-width="1.5" transform="rotate(30)"/>
    <line x1="0" y1="-195" x2="0" y2="-205" stroke="white" stroke-width="1.5" transform="rotate(60)"/>
    <line x1="0" y1="-195" x2="0" y2="-205" stroke="white" stroke-width="1.5" transform="rotate(90)"/>
    <line x1="0" y1="-195" x2="0" y2="-205" stroke="white" stroke-width="1.5" transform="rotate(120)"/>
    <line x1="0" y1="-195" x2="0" y2="-205" stroke="white" stroke-width="1.5" transform="rotate(150)"/>
    <line x1="0" y1="-195" x2="0" y2="-205" stroke="white" stroke-width="1.5" transform="rotate(180)"/>
    <line x1="0" y1="-195" x2="0" y2="-205" stroke="white" stroke-width="1.5" transform="rotate(210)"/>
    <line x1="0" y1="-195" x2="0" y2="-205" stroke="white" stroke-width="1.5" transform="rotate(240)"/>
    <line x1="0" y1="-195" x2="0" y2="-205" stroke="white" stroke-width="1.5" transform="rotate(270)"/>
    <line x1="0" y1="-195" x2="0" y2="-205" stroke="white" stroke-width="1.5" transform="rotate(300)"/>
    <line x1="0" y1="-195" x2="0" y2="-205" stroke="white" stroke-width="1.5" transform="rotate(330)"/>
  </g>
  <!-- Branding -->
  <text x="1150" y="600" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#16a34a" opacity="0.5">CVpass</text>
</svg>