<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="green1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="green2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="gold1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Spreadsheet grid -->
  <g transform="translate(80, 80)" opacity="0.12">
    <rect width="450" height="300" rx="8" fill="none" stroke="#16a34a" stroke-width="1"/>
    <!-- Rows -->
    <line x1="0" y1="40" x2="450" y2="40" stroke="#16a34a" stroke-width="0.8"/>
    <line x1="0" y1="80" x2="450" y2="80" stroke="#16a34a" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="450" y2="120" stroke="#16a34a" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="450" y2="160" stroke="#16a34a" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="450" y2="200" stroke="#16a34a" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="450" y2="240" stroke="#16a34a" stroke-width="0.5"/>
    <!-- Columns -->
    <line x1="60" y1="0" x2="60" y2="300" stroke="#16a34a" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="300" stroke="#16a34a" stroke-width="0.5"/>
    <line x1="260" y1="0" x2="260" y2="300" stroke="#16a34a" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="300" stroke="#16a34a" stroke-width="0.5"/>
    <!-- Header highlight -->
    <rect width="450" height="40" rx="8" fill="#16a34a" opacity="0.15"/>
  </g>

  <!-- Spreadsheet cell values -->
  <g transform="translate(80, 80)" font-family="system-ui,sans-serif" font-size="11" fill="#16a34a" opacity="0.25">
    <text x="70" y="28">Q1</text><text x="170" y="28">Q2</text>
    <text x="270" y="28">Q3</text><text x="370" y="28">Q4</text>
    <text x="8" y="68">Rev</text><text x="8" y="108">Cost</text>
    <text x="8" y="148">Net</text><text x="8" y="188">Tax</text>
    <text x="70" y="68">42.5k</text><text x="170" y="68">51.2k</text>
    <text x="270" y="68">48.7k</text><text x="370" y="68">63.1k</text>
  </g>

  <!-- Calculator -->
  <g transform="translate(650, 100)" filter="url(#shadow)">
    <rect width="160" height="220" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <!-- Screen -->
    <rect x="15" y="15" width="130" height="50" rx="8" fill="#0f172a" stroke="#16a34a" stroke-opacity="0.3" stroke-width="0.5"/>
    <text x="135" y="50" text-anchor="end" fill="#16a34a" font-family="monospace" font-size="22" font-weight="600">12,450</text>
    <!-- Buttons -->
    <g fill="#334155">
      <rect x="15" y="80" width="28" height="28" rx="6"/><rect x="51" y="80" width="28" height="28" rx="6"/>
      <rect x="87" y="80" width="28" height="28" rx="6"/><rect x="123" y="80" width="28" height="28" rx="6" fill="#f59e0b" opacity="0.6"/>
      <rect x="15" y="116" width="28" height="28" rx="6"/><rect x="51" y="116" width="28" height="28" rx="6"/>
      <rect x="87" y="116" width="28" height="28" rx="6"/><rect x="123" y="116" width="28" height="28" rx="6" fill="#f59e0b" opacity="0.5"/>
      <rect x="15" y="152" width="28" height="28" rx="6"/><rect x="51" y="152" width="28" height="28" rx="6"/>
      <rect x="87" y="152" width="28" height="28" rx="6"/><rect x="123" y="152" width="28" height="28" rx="6" fill="#16a34a" opacity="0.7"/>
      <rect x="15" y="185" width="64" height="24" rx="6"/><rect x="87" y="185" width="28" height="24" rx="6"/>
      <rect x="123" y="185" width="28" height="24" rx="6" fill="#16a34a" opacity="0.7"/>
    </g>
    <!-- Button labels -->
    <g fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">
      <text x="29" y="99">7</text><text x="65" y="99">8</text><text x="101" y="99">9</text>
      <text x="29" y="135">4</text><text x="65" y="135">5</text><text x="101" y="135">6</text>
      <text x="29" y="171">1</text><text x="65" y="171">2</text><text x="101" y="171">3</text>
    </g>
  </g>

  <!-- Euro signs floating -->
  <g font-family="system-ui,sans-serif" font-weight="700">
    <text x="880" y="160" fill="#f59e0b" font-size="48" opacity="0.2">&#8364;</text>
    <text x="950" y="250" fill="#16a34a" font-size="36" opacity="0.15">&#8364;</text>
    <text x="1050" y="180" fill="#f59e0b" font-size="28" opacity="0.12">&#8364;</text>
    <text x="1000" y="120" fill="#16a34a" font-size="56" opacity="0.1">&#8364;</text>
    <text x="870" y="80" fill="#f59e0b" font-size="24" opacity="0.15">&#8364;</text>
  </g>

  <!-- Bar chart (bottom area) -->
  <g transform="translate(650, 360)">
    <!-- Axis -->
    <line x1="0" y1="200" x2="480" y2="200" stroke="#334155" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="200" stroke="#334155" stroke-width="1"/>
    <!-- Grid -->
    <g stroke="#334155" stroke-width="0.3" opacity="0.5">
      <line x1="0" y1="50" x2="480" y2="50"/><line x1="0" y1="100" x2="480" y2="100"/>
      <line x1="0" y1="150" x2="480" y2="150"/>
    </g>
    <!-- Bars - green for revenue -->
    <rect x="20" y="120" width="30" height="80" rx="3" fill="url(#green2)" opacity="0.8"/>
    <rect x="80" y="90" width="30" height="110" rx="3" fill="url(#green2)" opacity="0.85"/>
    <rect x="140" y="60" width="30" height="140" rx="3" fill="url(#green2)" opacity="0.9"/>
    <rect x="200" y="40" width="30" height="160" rx="3" fill="url(#green1)"/>
    <rect x="260" y="30" width="30" height="170" rx="3" fill="url(#green1)" filter="url(#glow)"/>
    <rect x="320" y="50" width="30" height="150" rx="3" fill="url(#green2)" opacity="0.85"/>
    <!-- Gold accent bars (costs) -->
    <rect x="35" y="150" width="15" height="50" rx="2" fill="url(#gold1)" opacity="0.35"/>
    <rect x="95" y="130" width="15" height="70" rx="2" fill="url(#gold1)" opacity="0.35"/>
    <rect x="155" y="110" width="15" height="90" rx="2" fill="url(#gold1)" opacity="0.35"/>
    <rect x="215" y="100" width="15" height="100" rx="2" fill="url(#gold1)" opacity="0.35"/>
    <rect x="275" y="90" width="15" height="110" rx="2" fill="url(#gold1)" opacity="0.35"/>
    <rect x="335" y="105" width="15" height="95" rx="2" fill="url(#gold1)" opacity="0.35"/>
    <!-- Trend line -->
    <polyline points="35,115 95,85 155,55 215,35 275,25 335,45" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6 3" opacity="0.5"/>
  </g>

  <!-- Financial metric cards -->
  <g filter="url(#shadow)" transform="translate(100, 430)">
    <rect width="200" height="90" rx="10" fill="#1e293b" stroke="#16a34a" stroke-opacity="0.3" stroke-width="1"/>
    <text x="18" y="30" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="12">Bilan net</text>
    <text x="18" y="62" fill="#16a34a" font-family="system-ui,sans-serif" font-size="28" font-weight="700">+24.6%</text>
    <polygon points="155,50 168,35 181,50" fill="#16a34a" opacity="0.5"/>
  </g>

  <g filter="url(#shadow)" transform="translate(340, 450)">
    <rect width="180" height="75" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-opacity="0.25" stroke-width="1"/>
    <text x="18" y="28" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="12">Marge</text>
    <text x="18" y="55" fill="#f59e0b" font-family="system-ui,sans-serif" font-size="24" font-weight="700">18.3%</text>
  </g>

  <!-- Decorative coin circles -->
  <g opacity="0.15">
    <circle cx="580" cy="500" r="25" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <text x="580" y="506" text-anchor="middle" fill="#f59e0b" font-family="system-ui,sans-serif" font-size="18" font-weight="700">&#8364;</text>
    <circle cx="560" cy="520" r="25" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- CVpass branding -->
  <text x="1140" y="610" text-anchor="end" fill="#16a34a" font-family="system-ui,sans-serif" font-size="16" font-weight="600" opacity="0.3">CVpass</text>

  <!-- Corner accents -->
  <rect x="0" y="0" width="4" height="60" fill="#16a34a" opacity="0.4"/>
  <rect x="0" y="0" width="60" height="4" fill="#16a34a" opacity="0.4"/>
  <rect x="1196" y="570" width="4" height="60" fill="#f59e0b" opacity="0.3"/>
  <rect x="1140" y="626" width="60" height="4" fill="#f59e0b" opacity="0.3"/>
</svg>