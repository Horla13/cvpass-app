<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="orange5" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="chartFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow5">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg5)"/>

  <!-- Dynamic diagonal lines -->
  <g stroke="#f59e0b" stroke-width="1" opacity="0.04">
    <line x1="0" y1="630" x2="800" y2="0"/>
    <line x1="100" y1="630" x2="900" y2="0"/>
    <line x1="200" y1="630" x2="1000" y2="0"/>
    <line x1="300" y1="630" x2="1100" y2="0"/>
    <line x1="400" y1="630" x2="1200" y2="0"/>
  </g>

  <!-- Background glow -->
  <circle cx="700" cy="350" r="280" fill="#f59e0b" opacity="0.03"/>

  <!-- Chart area -->
  <g transform="translate(200, 120)" filter="url(#shadow5)">
    <!-- Chart background -->
    <rect x="-20" y="-20" width="520" height="420" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1" opacity="0.7"/>

    <!-- Grid lines -->
    <g stroke="#334155" stroke-width="1" opacity="0.5">
      <line x1="0" y1="0" x2="480" y2="0"/>
      <line x1="0" y1="76" x2="480" y2="76"/>
      <line x1="0" y1="152" x2="480" y2="152"/>
      <line x1="0" y1="228" x2="480" y2="228"/>
      <line x1="0" y1="304" x2="480" y2="304"/>
      <line x1="0" y1="380" x2="480" y2="380"/>
    </g>

    <!-- Y-axis labels -->
    <g font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="end">
      <text x="-8" y="4">100%</text>
      <text x="-8" y="80">80%</text>
      <text x="-8" y="156">60%</text>
      <text x="-8" y="232">40%</text>
      <text x="-8" y="308">20%</text>
      <text x="-8" y="384">0%</text>
    </g>

    <!-- Chart area fill -->
    <path d="M0,380 L60,340 L120,300 L180,280 L240,230 L300,180 L360,120 L420,60 L480,20 L480,380 Z" fill="url(#chartFill)"/>

    <!-- Chart line -->
    <path d="M0,340 L60,340 L120,300 L180,280 L240,230 L300,180 L360,120 L420,60 L480,20" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow5)"/>

    <!-- Data points -->
    <g fill="#f59e0b">
      <circle cx="0" cy="340" r="5" opacity="0.8"/>
      <circle cx="60" cy="340" r="5" opacity="0.8"/>
      <circle cx="120" cy="300" r="5" opacity="0.8"/>
      <circle cx="180" cy="280" r="5" opacity="0.8"/>
      <circle cx="240" cy="230" r="6" opacity="0.8"/>
      <circle cx="300" cy="180" r="6" opacity="0.8"/>
      <circle cx="360" cy="120" r="6" opacity="0.9"/>
      <circle cx="420" cy="60" r="7" opacity="0.9"/>
      <circle cx="480" cy="20" r="8" opacity="1"/>
    </g>
    <!-- Highlight last point -->
    <circle cx="480" cy="20" r="14" fill="#f59e0b" opacity="0.15"/>

    <!-- X-axis labels -->
    <g font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">
      <text x="0" y="398">J</text>
      <text x="60" y="398">F</text>
      <text x="120" y="398">M</text>
      <text x="180" y="398">A</text>
      <text x="240" y="398">M</text>
      <text x="300" y="398">J</text>
      <text x="360" y="398">J</text>
      <text x="420" y="398">A</text>
      <text x="480" y="398">S</text>
    </g>
  </g>

  <!-- Handshake icon -->
  <g transform="translate(850, 200)" filter="url(#glow5)">
    <circle r="65" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" opacity="0.8"/>
    <g stroke="#f59e0b" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
      <!-- Left hand -->
      <path d="M-30,8 L-18,-4 L-6,0 L6,-8 L18,-4"/>
      <!-- Right hand -->
      <path d="M30,8 L18,0 L6,8 L-6,4 L-18,8"/>
      <!-- Arms -->
      <line x1="-30" y1="8" x2="-38" y2="20"/>
      <line x1="30" y1="8" x2="38" y2="20"/>
      <!-- Cuffs -->
      <rect x="-44" y="18" width="14" height="10" rx="2" fill="#f59e0b" opacity="0.2"/>
      <rect x="30" y="18" width="14" height="10" rx="2" fill="#f59e0b" opacity="0.2"/>
    </g>
  </g>

  <!-- Target/bullseye -->
  <g transform="translate(900, 420)" filter="url(#glow5)">
    <circle r="55" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.3"/>
    <circle r="40" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
    <circle r="25" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
    <circle r="10" fill="#f59e0b" opacity="0.7"/>
    <circle r="4" fill="#fbbf24"/>
    <!-- Arrow -->
    <g transform="translate(-5, -5) rotate(-45)">
      <line x1="0" y1="0" x2="30" y2="0" stroke="#f59e0b" stroke-width="2" opacity="0.8"/>
      <path d="M30,0 L24,-4 L24,4 Z" fill="#f59e0b" opacity="0.8"/>
    </g>
  </g>

  <!-- Upward arrow indicator -->
  <g transform="translate(720, 120)" filter="url(#glow5)">
    <polygon points="0,-30 20,10 8,10 8,30 -8,30 -8,10 -20,10" fill="#f59e0b" opacity="0.5"/>
    <text x="0" y="55" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f59e0b" text-anchor="middle" opacity="0.6">+42%</text>
  </g>

  <!-- Floating $ signs -->
  <g font-family="system-ui, sans-serif" font-weight="700" fill="#f59e0b">
    <text x="1050" y="180" font-size="24" opacity="0.08">$</text>
    <text x="780" y="550" font-size="20" opacity="0.06">$</text>
    <text x="1100" cy="350" font-size="28" opacity="0.05">$</text>
  </g>

  <!-- Small particles -->
  <circle cx="150" cy="80" r="2" fill="#f59e0b" opacity="0.2"/>
  <circle cx="1100" cy="100" r="2.5" fill="#fbbf24" opacity="0.15"/>
  <circle cx="100" cy="550" r="2" fill="#f59e0b" opacity="0.18"/>
  <circle cx="1050" cy="550" r="3" fill="#d97706" opacity="0.12"/>

  <!-- CVpass branding -->
  <text x="1140" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#f59e0b" opacity="0.25" text-anchor="end" letter-spacing="2">CVpass</text>
</svg>