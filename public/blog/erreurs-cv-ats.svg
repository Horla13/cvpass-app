<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="doc3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glowRed">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg3)"/>

  <!-- Background subtle shapes -->
  <circle cx="300" cy="500" r="200" fill="#dc2626" opacity="0.02"/>
  <circle cx="900" cy="150" r="180" fill="#dc2626" opacity="0.02"/>

  <!-- Main CV document -->
  <g filter="url(#shadow3)" transform="translate(480, 80)">
    <rect width="280" height="380" rx="8" fill="url(#doc3)"/>
    <!-- Document corner fold -->
    <path d="M232,0 L280,0 L280,48 Z" fill="#cbd5e1"/>
    <path d="M232,0 L232,48 L280,48 Z" fill="#94a3b8" opacity="0.3"/>

    <!-- Header area -->
    <rect x="24" y="24" width="120" height="10" rx="5" fill="#94a3b8" opacity="0.3"/>
    <rect x="24" y="42" width="80" height="6" rx="3" fill="#cbd5e1" opacity="0.4"/>

    <!-- Section 1 - with errors -->
    <rect x="24" y="70" width="60" height="7" rx="3" fill="#64748b" opacity="0.3"/>
    <rect x="24" y="86" width="220" height="5" rx="2" fill="#dc2626" opacity="0.2"/>
    <rect x="24" y="98" width="200" height="5" rx="2" fill="#dc2626" opacity="0.2"/>
    <rect x="24" y="110" width="180" height="5" rx="2" fill="#cbd5e1" opacity="0.3"/>

    <!-- Section 2 -->
    <rect x="24" y="136" width="70" height="7" rx="3" fill="#64748b" opacity="0.3"/>
    <rect x="24" y="152" width="220" height="5" rx="2" fill="#cbd5e1" opacity="0.3"/>
    <rect x="24" y="164" width="190" height="5" rx="2" fill="#dc2626" opacity="0.2"/>
    <rect x="24" y="176" width="210" height="5" rx="2" fill="#cbd5e1" opacity="0.3"/>

    <!-- Section 3 -->
    <rect x="24" y="202" width="50" height="7" rx="3" fill="#64748b" opacity="0.3"/>
    <rect x="24" y="218" width="220" height="5" rx="2" fill="#cbd5e1" opacity="0.3"/>
    <rect x="24" y="230" width="200" height="5" rx="2" fill="#cbd5e1" opacity="0.3"/>
    <rect x="24" y="242" width="170" height="5" rx="2" fill="#dc2626" opacity="0.2"/>

    <!-- Section 4 -->
    <rect x="24" y="268" width="65" height="7" rx="3" fill="#64748b" opacity="0.3"/>
    <rect x="24" y="284" width="210" height="5" rx="2" fill="#cbd5e1" opacity="0.3"/>
    <rect x="24" y="296" width="190" height="5" rx="2" fill="#cbd5e1" opacity="0.3"/>
    <rect x="24" y="308" width="220" height="5" rx="2" fill="#cbd5e1" opacity="0.3"/>
    <rect x="24" y="320" width="150" height="5" rx="2" fill="#cbd5e1" opacity="0.3"/>

    <!-- Red strikethrough lines on errors -->
    <line x1="20" y1="89" x2="250" y2="89" stroke="#dc2626" stroke-width="1.5" opacity="0.5"/>
    <line x1="20" y1="101" x2="230" y2="101" stroke="#dc2626" stroke-width="1.5" opacity="0.5"/>
    <line x1="20" y1="167" x2="220" y2="167" stroke="#dc2626" stroke-width="1.5" opacity="0.5"/>
    <line x1="20" y1="245" x2="200" y2="245" stroke="#dc2626" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Floating X marks -->
  <g filter="url(#glowRed)">
    <!-- X mark 1 -->
    <g transform="translate(380, 180)" stroke="#dc2626" stroke-width="4" stroke-linecap="round" opacity="0.8">
      <line x1="-12" y1="-12" x2="12" y2="12"/>
      <line x1="12" y1="-12" x2="-12" y2="12"/>
    </g>
    <!-- X mark 2 -->
    <g transform="translate(820, 220)" stroke="#dc2626" stroke-width="3.5" stroke-linecap="round" opacity="0.7">
      <line x1="-10" y1="-10" x2="10" y2="10"/>
      <line x1="10" y1="-10" x2="-10" y2="10"/>
    </g>
    <!-- X mark 3 -->
    <g transform="translate(350, 380)" stroke="#ef4444" stroke-width="3" stroke-linecap="round" opacity="0.6">
      <line x1="-8" y1="-8" x2="8" y2="8"/>
      <line x1="8" y1="-8" x2="-8" y2="8"/>
    </g>
    <!-- X mark 4 -->
    <g transform="translate(850, 400)" stroke="#dc2626" stroke-width="3" stroke-linecap="round" opacity="0.5">
      <line x1="-9" y1="-9" x2="9" y2="9"/>
      <line x1="9" y1="-9" x2="-9" y2="9"/>
    </g>
  </g>

  <!-- Warning triangles -->
  <g filter="url(#glowRed)">
    <!-- Warning 1 -->
    <g transform="translate(310, 260)">
      <polygon points="0,-22 20,16 -20,16" fill="none" stroke="#f59e0b" stroke-width="2.5" opacity="0.7"/>
      <text x="0" y="10" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#f59e0b" text-anchor="middle" opacity="0.7">!</text>
    </g>
    <!-- Warning 2 -->
    <g transform="translate(870, 310)">
      <polygon points="0,-18 16,12 -16,12" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
      <text x="0" y="7" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f59e0b" text-anchor="middle" opacity="0.6">!</text>
    </g>
  </g>

  <!-- Checklist on the right side -->
  <g transform="translate(880, 130)">
    <!-- Checklist bg -->
    <rect x="-10" y="-10" width="200" height="180" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" opacity="0.8"/>

    <!-- Item 1 - crossed out (error) -->
    <g transform="translate(10, 16)">
      <rect width="18" height="18" rx="3" stroke="#dc2626" stroke-width="1.5" fill="none" opacity="0.7"/>
      <line x1="4" y1="4" x2="14" y2="14" stroke="#dc2626" stroke-width="2" opacity="0.7"/>
      <line x1="14" y1="4" x2="4" y2="14" stroke="#dc2626" stroke-width="2" opacity="0.7"/>
      <rect x="28" y="4" width="120" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
      <line x1="28" y1="7" x2="148" y2="7" stroke="#dc2626" stroke-width="1" opacity="0.4"/>
    </g>

    <!-- Item 2 - check (good) -->
    <g transform="translate(10, 52)">
      <rect width="18" height="18" rx="3" stroke="#16a34a" stroke-width="1.5" fill="none" opacity="0.7"/>
      <path d="M4,9 L8,14 L14,4" stroke="#16a34a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
      <rect x="28" y="4" width="100" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
    </g>

    <!-- Item 3 - crossed out -->
    <g transform="translate(10, 88)">
      <rect width="18" height="18" rx="3" stroke="#dc2626" stroke-width="1.5" fill="none" opacity="0.7"/>
      <line x1="4" y1="4" x2="14" y2="14" stroke="#dc2626" stroke-width="2" opacity="0.7"/>
      <line x1="14" y1="4" x2="4" y2="14" stroke="#dc2626" stroke-width="2" opacity="0.7"/>
      <rect x="28" y="4" width="140" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
      <line x1="28" y1="7" x2="168" y2="7" stroke="#dc2626" stroke-width="1" opacity="0.4"/>
    </g>

    <!-- Item 4 - check -->
    <g transform="translate(10, 124)">
      <rect width="18" height="18" rx="3" stroke="#16a34a" stroke-width="1.5" fill="none" opacity="0.7"/>
      <path d="M4,9 L8,14 L14,4" stroke="#16a34a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
      <rect x="28" y="4" width="110" height="5" rx="2" fill="#94a3b8" opacity="0.3"/>
    </g>
  </g>

  <!-- Red circle badge with number -->
  <g transform="translate(750, 110)">
    <circle r="24" fill="#dc2626" opacity="0.9"/>
    <text x="0" y="7" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">4</text>
  </g>

  <!-- Scattered small particles -->
  <circle cx="200" cy="150" r="2" fill="#dc2626" opacity="0.3"/>
  <circle cx="1000" cy="500" r="2.5" fill="#dc2626" opacity="0.25"/>
  <circle cx="150" cy="400" r="2" fill="#ef4444" opacity="0.2"/>
  <circle cx="600" cy="550" r="3" fill="#16a34a" opacity="0.15"/>
  <circle cx="1050" cy="200" r="2" fill="#f59e0b" opacity="0.2"/>

  <!-- CVpass branding -->
  <text x="1140" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#dc2626" opacity="0.25" text-anchor="end" letter-spacing="2">CVpass</text>
</svg>