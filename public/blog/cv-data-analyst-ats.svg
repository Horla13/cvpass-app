<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="teal1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="teal2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="green1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#14b8a6" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Floating metric card 1 -->
  <g filter="url(#shadow)" transform="translate(80, 80)">
    <rect width="220" height="120" rx="12" fill="#1e293b" stroke="#14b8a6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="20" y="35" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="13" font-weight="500">Score ATS</text>
    <text x="20" y="80" fill="#14b8a6" font-family="system-ui,sans-serif" font-size="42" font-weight="700">87%</text>
    <text x="130" y="80" fill="#16a34a" font-family="system-ui,sans-serif" font-size="14">+12%</text>
    <rect x="20" y="95" width="180" height="4" rx="2" fill="#334155"/>
    <rect x="20" y="95" width="156" height="4" rx="2" fill="url(#teal1)"/>
  </g>

  <!-- Floating metric card 2 -->
  <g filter="url(#shadow)" transform="translate(900, 60)">
    <rect width="220" height="120" rx="12" fill="#1e293b" stroke="#14b8a6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="20" y="35" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="13" font-weight="500">Candidatures</text>
    <text x="20" y="80" fill="#f1f5f9" font-family="system-ui,sans-serif" font-size="42" font-weight="700">342</text>
    <rect x="20" y="95" width="180" height="4" rx="2" fill="#334155"/>
    <rect x="20" y="95" width="120" height="4" rx="2" fill="url(#green1)"/>
  </g>

  <!-- Bar chart -->
  <g transform="translate(350, 150)">
    <rect x="0" y="180" width="40" height="120" rx="4" fill="url(#teal2)" opacity="0.7"/>
    <rect x="60" y="140" width="40" height="160" rx="4" fill="url(#teal2)" opacity="0.8"/>
    <rect x="120" y="100" width="40" height="200" rx="4" fill="url(#teal2)" opacity="0.85"/>
    <rect x="180" y="60" width="40" height="240" rx="4" fill="url(#teal1)"/>
    <rect x="240" y="30" width="40" height="270" rx="4" fill="url(#teal1)" filter="url(#glow)"/>
    <rect x="300" y="80" width="40" height="220" rx="4" fill="url(#teal2)" opacity="0.8"/>
    <rect x="360" y="120" width="40" height="180" rx="4" fill="url(#teal2)" opacity="0.7"/>
    <!-- Axis -->
    <line x1="0" y1="300" x2="400" y2="300" stroke="#334155" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="300" stroke="#334155" stroke-width="1"/>
  </g>

  <!-- Pie chart -->
  <g transform="translate(180, 380)">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#1e293b" stroke-width="30"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#14b8a6" stroke-width="30" stroke-dasharray="200 503" stroke-dashoffset="-80" opacity="0.9"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#16a34a" stroke-width="30" stroke-dasharray="150 503" stroke-dashoffset="-280" opacity="0.8"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#0d9488" stroke-width="30" stroke-dasharray="100 503" stroke-dashoffset="-430" opacity="0.6"/>
    <circle cx="0" cy="0" r="60" fill="#0f172a"/>
    <text x="0" y="5" text-anchor="middle" fill="#14b8a6" font-family="system-ui,sans-serif" font-size="18" font-weight="700">67%</text>
  </g>

  <!-- Scatter plot dots -->
  <g opacity="0.6">
    <circle cx="850" cy="280" r="6" fill="#14b8a6"/><circle cx="880" cy="310" r="4" fill="#14b8a6"/>
    <circle cx="920" cy="260" r="8" fill="#14b8a6" opacity="0.8"/><circle cx="960" cy="290" r="5" fill="#16a34a"/>
    <circle cx="1000" cy="240" r="7" fill="#14b8a6"/><circle cx="1040" cy="270" r="4" fill="#16a34a"/>
    <circle cx="870" cy="350" r="5" fill="#0d9488"/><circle cx="940" cy="330" r="6" fill="#14b8a6"/>
    <circle cx="1010" cy="310" r="3" fill="#16a34a"/><circle cx="1060" cy="250" r="5" fill="#14b8a6"/>
    <circle cx="1100" cy="230" r="9" fill="#14b8a6" opacity="0.7" filter="url(#glow)"/>
  </g>

  <!-- Data stream lines -->
  <g stroke="#14b8a6" stroke-width="1.5" fill="none" opacity="0.25">
    <path d="M 0 520 Q 200 480, 400 500 T 800 460 T 1200 490"/>
    <path d="M 0 550 Q 300 530, 500 540 T 900 510 T 1200 530"/>
    <path d="M 0 580 Q 250 560, 600 570 T 1000 550 T 1200 560"/>
  </g>

  <!-- Floating data points on stream -->
  <g fill="#14b8a6" opacity="0.5">
    <circle cx="400" cy="500" r="3"/><circle cx="600" cy="475" r="3"/>
    <circle cx="800" cy="460" r="3"/><circle cx="1000" cy="480" r="3"/>
  </g>

  <!-- Metric card bottom right -->
  <g filter="url(#shadow)" transform="translate(880, 420)">
    <rect width="240" height="100" rx="12" fill="#1e293b" stroke="#16a34a" stroke-opacity="0.3" stroke-width="1"/>
    <text x="20" y="30" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="12">Taux de match</text>
    <text x="20" y="65" fill="#16a34a" font-family="system-ui,sans-serif" font-size="32" font-weight="700">94.2%</text>
    <polygon points="170,55 185,40 200,55" fill="#16a34a" opacity="0.6"/>
  </g>

  <!-- CVpass branding -->
  <text x="1140" y="610" text-anchor="end" fill="#14b8a6" font-family="system-ui,sans-serif" font-size="16" font-weight="600" opacity="0.35">CVpass</text>

  <!-- Decorative corner accents -->
  <rect x="0" y="0" width="4" height="60" fill="#14b8a6" opacity="0.4"/>
  <rect x="0" y="0" width="60" height="4" fill="#14b8a6" opacity="0.4"/>
  <rect x="1196" y="570" width="4" height="60" fill="#14b8a6" opacity="0.4"/>
  <rect x="1140" y="626" width="60" height="4" fill="#14b8a6" opacity="0.4"/>
</svg>