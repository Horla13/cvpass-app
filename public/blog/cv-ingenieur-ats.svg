<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="steel1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <linearGradient id="greenAcc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <!-- Gear tooth pattern -->
    <clipPath id="gearClip"><rect width="1200" height="630"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Blueprint grid -->
  <g opacity="0.06" stroke="#64748b" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="50" y1="0" x2="50" y2="630"/>
    <line x1="100" y1="0" x2="100" y2="630"/><line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="250" y1="0" x2="250" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/><line x1="350" y1="0" x2="350" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/><line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/><line x1="550" y1="0" x2="550" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="650" y1="0" x2="650" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/><line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/><line x1="850" y1="0" x2="850" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/><line x1="950" y1="0" x2="950" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/><line x1="1050" y1="0" x2="1050" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/><line x1="1150" y1="0" x2="1150" y2="630"/>
    <line x1="0" y1="50" x2="1200" y2="50"/><line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="450" x2="1200" y2="450"/><line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="550" x2="1200" y2="550"/><line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Large gear (center-left) -->
  <g transform="translate(400, 300)" opacity="0.7">
    <!-- Gear body -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#64748b" stroke-width="3"/>
    <circle cx="0" cy="0" r="85" fill="none" stroke="#64748b" stroke-width="1" opacity="0.4"/>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#64748b" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="15" fill="#64748b" opacity="0.3"/>
    <!-- Gear teeth -->
    <g fill="none" stroke="#64748b" stroke-width="3">
      <line x1="0" y1="-100" x2="0" y2="-120"/><line x1="0" y1="100" x2="0" y2="120"/>
      <line x1="-100" y1="0" x2="-120" y2="0"/><line x1="100" y1="0" x2="120" y2="0"/>
      <line x1="-71" y1="-71" x2="-85" y2="-85"/><line x1="71" y1="-71" x2="85" y2="-85"/>
      <line x1="-71" y1="71" x2="-85" y2="85"/><line x1="71" y1="71" x2="85" y2="85"/>
      <line x1="-38" y1="-92" x2="-46" y2="-111"/><line x1="38" y1="-92" x2="46" y2="-111"/>
      <line x1="-92" y1="-38" x2="-111" y2="-46"/><line x1="-92" y1="38" x2="-111" y2="46"/>
      <line x1="92" y1="-38" x2="111" y2="-46"/><line x1="92" y1="38" x2="111" y2="46"/>
      <line x1="-38" y1="92" x2="-46" y2="111"/><line x1="38" y1="92" x2="46" y2="111"/>
    </g>
    <!-- Tooth caps -->
    <g fill="#64748b" opacity="0.5">
      <rect x="-8" y="-128" width="16" height="12" rx="2"/><rect x="-8" y="116" width="16" height="12" rx="2"/>
      <rect x="-128" y="-8" width="12" height="16" rx="2"/><rect x="116" y="-8" width="12" height="16" rx="2"/>
      <rect x="-91" y="-91" width="14" height="14" rx="2" transform="rotate(45 -84 -84)"/>
      <rect x="77" y="-91" width="14" height="14" rx="2" transform="rotate(45 84 -84)"/>
      <rect x="-91" y="77" width="14" height="14" rx="2" transform="rotate(45 -84 84)"/>
      <rect x="77" y="77" width="14" height="14" rx="2" transform="rotate(45 84 84)"/>
    </g>
    <!-- Spokes -->
    <g stroke="#64748b" stroke-width="1.5" opacity="0.3">
      <line x1="-35" y1="0" x2="-85" y2="0"/><line x1="35" y1="0" x2="85" y2="0"/>
      <line x1="0" y1="-35" x2="0" y2="-85"/><line x1="0" y1="35" x2="0" y2="85"/>
    </g>
  </g>

  <!-- Medium gear (interlocking, upper-right) -->
  <g transform="translate(570, 180)" opacity="0.55">
    <circle cx="0" cy="0" r="65" fill="none" stroke="#16a34a" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="52" fill="none" stroke="#16a34a" stroke-width="0.8" opacity="0.4"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#16a34a" stroke-width="2"/>
    <circle cx="0" cy="0" r="10" fill="#16a34a" opacity="0.3"/>
    <!-- Teeth -->
    <g fill="none" stroke="#16a34a" stroke-width="2.5">
      <line x1="0" y1="-65" x2="0" y2="-80"/><line x1="0" y1="65" x2="0" y2="80"/>
      <line x1="-65" y1="0" x2="-80" y2="0"/><line x1="65" y1="0" x2="80" y2="0"/>
      <line x1="-46" y1="-46" x2="-57" y2="-57"/><line x1="46" y1="-46" x2="57" y2="-57"/>
      <line x1="-46" y1="46" x2="-57" y2="57"/><line x1="46" y1="46" x2="57" y2="57"/>
      <line x1="-25" y1="-60" x2="-30" y2="-75"/><line x1="25" y1="-60" x2="30" y2="-75"/>
      <line x1="-60" y1="-25" x2="-75" y2="-30"/><line x1="60" y1="-25" x2="75" y2="-30"/>
      <line x1="-60" y1="25" x2="-75" y2="30"/><line x1="60" y1="25" x2="75" y2="30"/>
      <line x1="-25" y1="60" x2="-30" y2="75"/><line x1="25" y1="60" x2="30" y2="75"/>
    </g>
  </g>

  <!-- Small gear (lower) -->
  <g transform="translate(520, 440)" opacity="0.45">
    <circle cx="0" cy="0" r="45" fill="none" stroke="#64748b" stroke-width="2"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#64748b" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="6" fill="#64748b" opacity="0.3"/>
    <g fill="none" stroke="#64748b" stroke-width="2">
      <line x1="0" y1="-45" x2="0" y2="-57"/><line x1="0" y1="45" x2="0" y2="57"/>
      <line x1="-45" y1="0" x2="-57" y2="0"/><line x1="45" y1="0" x2="57" y2="0"/>
      <line x1="-32" y1="-32" x2="-40" y2="-40"/><line x1="32" y1="-32" x2="40" y2="-40"/>
      <line x1="-32" y1="32" x2="-40" y2="40"/><line x1="32" y1="32" x2="40" y2="40"/>
    </g>
  </g>

  <!-- Circuit board traces -->
  <g stroke="#16a34a" stroke-width="1.5" fill="none" opacity="0.2">
    <path d="M 750 100 L 850 100 L 850 200 L 950 200"/>
    <path d="M 750 150 L 800 150 L 800 250 L 900 250 L 900 300"/>
    <path d="M 850 100 L 850 50 L 1000 50 L 1000 150"/>
    <path d="M 950 200 L 1050 200 L 1050 300 L 1100 300"/>
    <path d="M 900 300 L 900 400 L 1000 400"/>
    <path d="M 1000 150 L 1100 150 L 1100 200"/>
    <path d="M 1000 400 L 1000 500 L 1100 500"/>
    <path d="M 1100 300 L 1100 400 L 1050 400 L 1050 480"/>
  </g>

  <!-- Circuit nodes -->
  <g fill="#16a34a" opacity="0.4">
    <circle cx="750" cy="100" r="4"/><circle cx="850" cy="100" r="3"/>
    <circle cx="950" cy="200" r="4"/><circle cx="750" cy="150" r="3"/>
    <circle cx="900" cy="300" r="4"/><circle cx="1000" cy="150" r="3"/>
    <circle cx="1100" cy="300" r="4"/><circle cx="1000" cy="400" r="3"/>
    <circle cx="1100" cy="500" r="4" filter="url(#glow)"/>
    <circle cx="850" cy="50" r="3"/><circle cx="1000" cy="50" r="3"/>
  </g>

  <!-- IC chip symbols -->
  <g transform="translate(950, 160)" opacity="0.2">
    <rect width="40" height="60" rx="4" fill="none" stroke="#16a34a" stroke-width="1.5"/>
    <line x1="-8" y1="12" x2="0" y2="12" stroke="#16a34a" stroke-width="1"/>
    <line x1="-8" y1="24" x2="0" y2="24" stroke="#16a34a" stroke-width="1"/>
    <line x1="-8" y1="36" x2="0" y2="36" stroke="#16a34a" stroke-width="1"/>
    <line x1="-8" y1="48" x2="0" y2="48" stroke="#16a34a" stroke-width="1"/>
    <line x1="40" y1="12" x2="48" y2="12" stroke="#16a34a" stroke-width="1"/>
    <line x1="40" y1="24" x2="48" y2="24" stroke="#16a34a" stroke-width="1"/>
    <line x1="40" y1="36" x2="48" y2="36" stroke="#16a34a" stroke-width="1"/>
    <line x1="40" y1="48" x2="48" y2="48" stroke="#16a34a" stroke-width="1"/>
  </g>

  <!-- Compass/ruler elements -->
  <!-- Compass -->
  <g transform="translate(150, 120)" opacity="0.3">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#64748b" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="3" fill="#64748b"/>
    <!-- Compass needle -->
    <line x1="0" y1="0" x2="35" y2="-35" stroke="#16a34a" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-20" y2="40" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Tick marks -->
    <g stroke="#64748b" stroke-width="1">
      <line x1="0" y1="-50" x2="0" y2="-42"/><line x1="0" y1="50" x2="0" y2="42"/>
      <line x1="-50" y1="0" x2="-42" y2="0"/><line x1="50" y1="0" x2="42" y2="0"/>
    </g>
    <text x="0" y="-55" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">N</text>
  </g>

  <!-- Ruler -->
  <g transform="translate(80, 500)" opacity="0.2">
    <rect width="300" height="25" rx="3" fill="none" stroke="#64748b" stroke-width="1.5"/>
    <g stroke="#64748b" stroke-width="0.8">
      <line x1="30" y1="0" x2="30" y2="12"/><line x1="60" y1="0" x2="60" y2="16"/>
      <line x1="90" y1="0" x2="90" y2="12"/><line x1="120" y1="0" x2="120" y2="16"/>
      <line x1="150" y1="0" x2="150" y2="12"/><line x1="180" y1="0" x2="180" y2="16"/>
      <line x1="210" y1="0" x2="210" y2="12"/><line x1="240" y1="0" x2="240" y2="16"/>
      <line x1="270" y1="0" x2="270" y2="12"/>
    </g>
  </g>

  <!-- Technical dimension lines -->
  <g stroke="#64748b" stroke-width="0.8" opacity="0.15">
    <!-- Horizontal dimension -->
    <line x1="280" y1="450" x2="520" y2="450"/>
    <line x1="280" y1="440" x2="280" y2="460"/>
    <line x1="520" y1="440" x2="520" y2="460"/>
    <text x="400" y="445" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10" opacity="1">240mm</text>
  </g>

  <!-- Angle arc (drafting) -->
  <g transform="translate(200, 380)" opacity="0.2">
    <line x1="0" y1="0" x2="80" y2="0" stroke="#64748b" stroke-width="1"/>
    <line x1="0" y1="0" x2="60" y2="-50" stroke="#16a34a" stroke-width="1"/>
    <path d="M 30 0 A 30 30 0 0 0 23 -19" fill="none" stroke="#16a34a" stroke-width="1"/>
    <text x="38" y="-8" fill="#16a34a" font-family="system-ui,sans-serif" font-size="9">40&#176;</text>
  </g>

  <!-- Tiny gear (far right) -->
  <g transform="translate(1050, 450)" opacity="0.3">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#64748b" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#64748b" stroke-width="1"/>
    <g stroke="#64748b" stroke-width="1.5">
      <line x1="0" y1="-30" x2="0" y2="-38"/><line x1="0" y1="30" x2="0" y2="38"/>
      <line x1="-30" y1="0" x2="-38" y2="0"/><line x1="30" y1="0" x2="38" y2="0"/>
      <line x1="-21" y1="-21" x2="-27" y2="-27"/><line x1="21" y1="-21" x2="27" y2="-27"/>
      <line x1="-21" y1="21" x2="-27" y2="27"/><line x1="21" y1="21" x2="27" y2="27"/>
    </g>
  </g>

  <!-- CVpass branding -->
  <text x="1140" y="610" text-anchor="end" fill="#64748b" font-family="system-ui,sans-serif" font-size="16" font-weight="600" opacity="0.35">CVpass</text>

  <!-- Corner accents -->
  <rect x="0" y="0" width="4" height="60" fill="#64748b" opacity="0.4"/>
  <rect x="0" y="0" width="60" height="4" fill="#64748b" opacity="0.4"/>
  <rect x="1196" y="570" width="4" height="60" fill="#16a34a" opacity="0.4"/>
  <rect x="1140" y="626" width="60" height="4" fill="#16a34a" opacity="0.4"/>
</svg>