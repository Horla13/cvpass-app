<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="vsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow5">
      <feDropShadow dx="0" dy="6" stdDeviation="15" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="redShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#ef4444" flood-opacity="0.2"/>
    </filter>
    <filter id="blueShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#3b82f6" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg5)"/>
  <!-- Subtle grid -->
  <g opacity="0.04">
    <pattern id="grid5" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="white"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid5)"/>
  </g>
  <!-- Dividing line -->
  <line x1="600" y1="80" x2="600" y2="550" stroke="#334155" stroke-width="1" stroke-dasharray="6,6" opacity="0.4"/>
  <!-- Red glow left -->
  <circle cx="350" cy="300" r="200" fill="#ef4444" opacity="0.03"/>
  <!-- Blue glow right -->
  <circle cx="850" cy="300" r="200" fill="#3b82f6" opacity="0.03"/>
  <!-- PDF Document - Left side -->
  <g filter="url(#redShadow)" transform="translate(250, 130)">
    <!-- Document body -->
    <rect x="0" y="0" width="200" height="270" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <!-- Fold corner -->
    <path d="M160,0 L200,0 L200,40 Z" fill="#0f172a"/>
    <path d="M160,0 L160,40 L200,40" fill="#475569" stroke="#475569" stroke-width="1" stroke-linejoin="round"/>
    <!-- PDF badge -->
    <rect x="55" y="90" width="90" height="40" rx="6" fill="url(#redGrad)" opacity="0.9"/>
    <text x="100" y="117" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="white">PDF</text>
    <!-- Content lines -->
    <rect x="25" y="30" width="80" height="8" rx="2" fill="#ef4444" opacity="0.3"/>
    <rect x="25" y="48" width="60" height="5" rx="1.5" fill="#64748b" opacity="0.2"/>
    <rect x="25" y="60" width="100" height="5" rx="1.5" fill="#64748b" opacity="0.15"/>
    <rect x="25" y="150" width="140" height="5" rx="1.5" fill="#64748b" opacity="0.15"/>
    <rect x="25" y="165" width="120" height="5" rx="1.5" fill="#64748b" opacity="0.15"/>
    <rect x="25" y="180" width="145" height="5" rx="1.5" fill="#64748b" opacity="0.15"/>
    <rect x="25" y="195" width="110" height="5" rx="1.5" fill="#64748b" opacity="0.15"/>
    <rect x="25" y="220" width="70" height="5" rx="1.5" fill="#ef4444" opacity="0.2"/>
    <rect x="25" y="235" width="130" height="5" rx="1.5" fill="#64748b" opacity="0.15"/>
    <rect x="25" y="250" width="100" height="5" rx="1.5" fill="#64748b" opacity="0.15"/>
  </g>
  <!-- Red accent icon (file type) -->
  <g transform="translate(350, 440)" opacity="0.5">
    <rect x="-20" y="0" width="40" height="5" rx="2.5" fill="#ef4444"/>
    <rect x="-15" y="10" width="30" height="5" rx="2.5" fill="#ef4444" opacity="0.6"/>
    <rect x="-10" y="20" width="20" height="5" rx="2.5" fill="#ef4444" opacity="0.3"/>
  </g>
  <!-- DOCX Document - Right side -->
  <g filter="url(#blueShadow)" transform="translate(750, 130)">
    <!-- Document body -->
    <rect x="0" y="0" width="200" height="270" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <!-- Fold corner -->
    <path d="M160,0 L200,0 L200,40 Z" fill="#0f172a"/>
    <path d="M160,0 L160,40 L200,40" fill="#475569" stroke="#475569" stroke-width="1" stroke-linejoin="round"/>
    <!-- DOCX badge -->
    <rect x="40" y="90" width="120" height="40" rx="6" fill="url(#blueGrad)" opacity="0.9"/>
    <text x="100" y="117" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="white">DOCX</text>
    <!-- Content lines -->
    <rect x="25" y="30" width="80" height="8" rx="2" fill="#3b82f6" opacity="0.3"/>
    <rect x="25" y="48" width="60" height="5" rx="1.5" fill="#64748b" opacity="0.2"/>
    <rect x="25" y="60" width="100" height="5" rx="1.5" fill="#64748b" opacity="0.15"/>
    <rect x="25" y="150" width="140" height="5" rx="1.5" fill="#64748b" opacity="0.15"/>
    <rect x="25" y="165" width="120" height="5" rx="1.5" fill="#64748b" opacity="0.15"/>
    <rect x="25" y="180" width="145" height="5" rx="1.5" fill="#64748b" opacity="0.15"/>
    <rect x="25" y="195" width="110" height="5" rx="1.5" fill="#64748b" opacity="0.15"/>
    <rect x="25" y="220" width="70" height="5" rx="1.5" fill="#3b82f6" opacity="0.2"/>
    <rect x="25" y="235" width="130" height="5" rx="1.5" fill="#64748b" opacity="0.15"/>
    <rect x="25" y="250" width="100" height="5" rx="1.5" fill="#64748b" opacity="0.15"/>
  </g>
  <!-- Blue accent icon (file type) -->
  <g transform="translate(850, 440)" opacity="0.5">
    <rect x="-20" y="0" width="40" height="5" rx="2.5" fill="#3b82f6"/>
    <rect x="-15" y="10" width="30" height="5" rx="2.5" fill="#3b82f6" opacity="0.6"/>
    <rect x="-10" y="20" width="20" height="5" rx="2.5" fill="#3b82f6" opacity="0.3"/>
  </g>
  <!-- VS Badge - Center -->
  <g filter="url(#glow5)" transform="translate(600, 285)">
    <circle r="40" fill="#0f172a" stroke="url(#vsBg)" stroke-width="3"/>
    <text x="0" y="10" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#f59e0b">VS</text>
  </g>
  <!-- Decorative lightning bolts between -->
  <g opacity="0.15" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="545,200 555,215 540,225 550,240"/>
    <polyline points="655,200 665,215 650,225 660,240"/>
    <polyline points="545,380 555,395 540,405 550,420"/>
    <polyline points="655,380 665,395 650,405 660,420"/>
  </g>
  <!-- Arrows pointing between -->
  <g opacity="0.3">
    <polyline points="480,290 520,290" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
    <polygon points="520,285 530,290 520,295" fill="#94a3b8"/>
    <polyline points="720,290 680,290" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
    <polygon points="680,285 670,290 680,295" fill="#94a3b8"/>
  </g>
  <!-- Branding -->
  <text x="1150" y="600" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#16a34a" opacity="0.5">CVpass</text>
</svg>