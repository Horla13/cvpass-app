<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="docFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="warnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <clipPath id="pixelClip">
      <rect x="0" y="0" width="680" height="430"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <!-- Subtle grid -->
  <g opacity="0.04">
    <pattern id="grid2" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="60" height="60" fill="none" stroke="white" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid2)"/>
  </g>
  <!-- Background accents -->
  <circle cx="150" cy="500" r="200" fill="#f97316" opacity="0.03"/>
  <circle cx="1050" cy="130" r="150" fill="#f97316" opacity="0.03"/>
  <!-- Main CV document -->
  <g filter="url(#shadow)" transform="translate(380, 80)">
    <!-- Document body -->
    <rect x="0" y="0" width="300" height="400" rx="8" fill="url(#docFill)" stroke="#475569" stroke-width="1.5"/>
    <!-- Document fold corner -->
    <path d="M260,0 L300,0 L300,40 Z" fill="#0f172a"/>
    <path d="M260,0 L260,40 L300,40" fill="#475569" stroke="#475569" stroke-width="1" stroke-linejoin="round"/>
    <!-- Fake CV content lines -->
    <!-- Header area -->
    <rect x="30" y="35" width="120" height="12" rx="3" fill="#94a3b8" opacity="0.3"/>
    <rect x="30" y="55" width="80" height="8" rx="2" fill="#64748b" opacity="0.2"/>
    <!-- Photo placeholder -->
    <rect x="200" y="30" width="45" height="45" rx="6" fill="#475569" stroke="#64748b" stroke-width="1"/>
    <!-- Section -->
    <rect x="30" y="90" width="60" height="8" rx="2" fill="#16a34a" opacity="0.4"/>
    <rect x="30" y="108" width="200" height="6" rx="2" fill="#64748b" opacity="0.15"/>
    <rect x="30" y="122" width="180" height="6" rx="2" fill="#64748b" opacity="0.15"/>
    <rect x="30" y="136" width="210" height="6" rx="2" fill="#64748b" opacity="0.15"/>
    <rect x="30" y="150" width="160" height="6" rx="2" fill="#64748b" opacity="0.15"/>
    <!-- Section 2 -->
    <rect x="30" y="180" width="80" height="8" rx="2" fill="#16a34a" opacity="0.4"/>
    <rect x="30" y="198" width="190" height="6" rx="2" fill="#64748b" opacity="0.15"/>
    <rect x="30" y="212" width="210" height="6" rx="2" fill="#64748b" opacity="0.15"/>
    <rect x="30" y="226" width="170" height="6" rx="2" fill="#64748b" opacity="0.15"/>
    <!-- Section 3 -->
    <rect x="30" y="256" width="70" height="8" rx="2" fill="#16a34a" opacity="0.4"/>
    <rect x="30" y="274" width="200" height="6" rx="2" fill="#64748b" opacity="0.15"/>
    <rect x="30" y="288" width="185" height="6" rx="2" fill="#64748b" opacity="0.15"/>
    <rect x="30" y="302" width="195" height="6" rx="2" fill="#64748b" opacity="0.15"/>
    <rect x="30" y="316" width="140" height="6" rx="2" fill="#64748b" opacity="0.15"/>
    <!-- Bottom section -->
    <rect x="30" y="346" width="90" height="8" rx="2" fill="#16a34a" opacity="0.4"/>
    <rect x="30" y="364" width="180" height="6" rx="2" fill="#64748b" opacity="0.15"/>
    <rect x="30" y="378" width="160" height="6" rx="2" fill="#64748b" opacity="0.15"/>
  </g>
  <!-- Pixelated/broken corner effect -->
  <g transform="translate(380, 80)" opacity="0.9">
    <rect x="230" y="330" width="12" height="12" fill="#f97316" opacity="0.6"/>
    <rect x="245" y="330" width="12" height="12" fill="#f97316" opacity="0.4"/>
    <rect x="260" y="330" width="12" height="12" fill="#f97316" opacity="0.7"/>
    <rect x="275" y="330" width="12" height="12" fill="#f97316" opacity="0.3"/>
    <rect x="288" y="330" width="12" height="12" fill="#f97316" opacity="0.5"/>
    <rect x="240" y="345" width="12" height="12" fill="#f97316" opacity="0.5"/>
    <rect x="255" y="345" width="12" height="12" fill="#f97316" opacity="0.3"/>
    <rect x="270" y="345" width="12" height="12" fill="#f97316" opacity="0.8"/>
    <rect x="288" y="345" width="12" height="12" fill="#f97316" opacity="0.4"/>
    <rect x="250" y="360" width="12" height="12" fill="#f97316" opacity="0.6"/>
    <rect x="265" y="360" width="12" height="12" fill="#f97316" opacity="0.4"/>
    <rect x="280" y="360" width="12" height="12" fill="#f97316" opacity="0.7"/>
    <rect x="260" y="375" width="12" height="12" fill="#f97316" opacity="0.3"/>
    <rect x="275" y="375" width="12" height="12" fill="#f97316" opacity="0.5"/>
    <rect x="288" y="375" width="12" height="12" fill="#f97316" opacity="0.6"/>
    <rect x="275" y="390" width="12" height="12" fill="#f97316" opacity="0.4"/>
    <rect x="288" y="390" width="12" height="12" fill="#f97316" opacity="0.7"/>
  </g>
  <!-- Warning triangle overlay -->
  <g filter="url(#glow2)" transform="translate(730, 250)">
    <polygon points="0,-65 60,40 -60,40" fill="none" stroke="url(#warnGrad)" stroke-width="4" stroke-linejoin="round"/>
    <text x="0" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="50" font-weight="700" fill="#f97316">!</text>
  </g>
  <!-- Small warning triangles scattered -->
  <g opacity="0.3">
    <polygon points="200,200 210,220 190,220" fill="none" stroke="#f97316" stroke-width="1.5" stroke-linejoin="round"/>
    <polygon points="950,400 958,415 942,415" fill="none" stroke="#f97316" stroke-width="1.5" stroke-linejoin="round"/>
    <polygon points="300,450 306,462 294,462" fill="none" stroke="#f97316" stroke-width="1" stroke-linejoin="round"/>
    <polygon points="1000,180 1006,192 994,192" fill="none" stroke="#f97316" stroke-width="1" stroke-linejoin="round"/>
  </g>
  <!-- X marks for rejected/broken -->
  <g stroke="#ef4444" stroke-width="2" opacity="0.25" stroke-linecap="round">
    <line x1="170" y1="310" x2="185" y2="325"/><line x1="185" y1="310" x2="170" y2="325"/>
    <line x1="1020" y1="280" x2="1035" y2="295"/><line x1="1035" y1="280" x2="1020" y2="295"/>
    <line x1="880" y1="130" x2="892" y2="142"/><line x1="892" y1="130" x2="880" y2="142"/>
  </g>
  <!-- Branding -->
  <text x="1150" y="600" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#16a34a" opacity="0.5">CVpass</text>
</svg>