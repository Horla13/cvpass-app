<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="purple6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="card6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow6">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow6">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg6)"/>

  <!-- Background subtle circles -->
  <circle cx="400" cy="200" r="200" fill="#8b5cf6" opacity="0.02"/>
  <circle cx="800" cy="400" r="250" fill="#8b5cf6" opacity="0.02"/>

  <!-- Kanban Board -->
  <g transform="translate(100, 60)" filter="url(#shadow6)">

    <!-- Column 1: To Do -->
    <g transform="translate(0, 0)">
      <rect width="220" height="480" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <!-- Column header -->
      <rect width="220" height="44" rx="10" fill="#334155" opacity="0.5"/>
      <rect y="34" width="220" height="10" fill="#334155" opacity="0.5"/>
      <circle cx="20" cy="22" r="5" fill="#94a3b8" opacity="0.5"/>
      <text x="34" y="27" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#94a3b8" opacity="0.8">A FAIRE</text>
      <text x="200" y="27" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="end">3</text>

      <!-- Card 1 -->
      <g transform="translate(12, 56)" filter="url(#cardShadow)">
        <rect width="196" height="72" rx="6" fill="url(#card6)" stroke="#475569" stroke-width="0.5"/>
        <rect x="8" y="8" width="40" height="5" rx="2" fill="#8b5cf6" opacity="0.6"/>
        <rect x="8" y="22" width="160" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
        <rect x="8" y="32" width="120" height="4" rx="2" fill="#94a3b8" opacity="0.2"/>
        <circle cx="175" cy="56" r="10" fill="#334155" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
        <text x="175" y="60" font-family="system-ui, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" opacity="0.6">GR</text>
      </g>

      <!-- Card 2 -->
      <g transform="translate(12, 140)" filter="url(#cardShadow)">
        <rect width="196" height="72" rx="6" fill="url(#card6)" stroke="#475569" stroke-width="0.5"/>
        <rect x="8" y="8" width="55" height="5" rx="2" fill="#f59e0b" opacity="0.5"/>
        <rect x="8" y="22" width="150" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
        <rect x="8" y="32" width="130" height="4" rx="2" fill="#94a3b8" opacity="0.2"/>
        <circle cx="175" cy="56" r="10" fill="#334155" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
        <text x="175" y="60" font-family="system-ui, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle" opacity="0.6">ML</text>
      </g>

      <!-- Card 3 -->
      <g transform="translate(12, 224)" filter="url(#cardShadow)">
        <rect width="196" height="60" rx="6" fill="url(#card6)" stroke="#475569" stroke-width="0.5"/>
        <rect x="8" y="8" width="35" height="5" rx="2" fill="#06b6d4" opacity="0.5"/>
        <rect x="8" y="22" width="140" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
        <rect x="8" y="32" width="100" height="4" rx="2" fill="#94a3b8" opacity="0.2"/>
      </g>
    </g>

    <!-- Column 2: In Progress -->
    <g transform="translate(240, 0)">
      <rect width="220" height="480" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="1" opacity="0.9"/>
      <rect width="220" height="44" rx="10" fill="#8b5cf6" opacity="0.15"/>
      <rect y="34" width="220" height="10" fill="#8b5cf6" opacity="0.15"/>
      <circle cx="20" cy="22" r="5" fill="#8b5cf6" opacity="0.7"/>
      <text x="34" y="27" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#a78bfa" opacity="0.9">EN COURS</text>
      <text x="200" y="27" font-family="system-ui, sans-serif" font-size="12" fill="#8b5cf6" text-anchor="end">2</text>

      <!-- Card 1 - highlighted -->
      <g transform="translate(12, 56)" filter="url(#cardShadow)">
        <rect width="196" height="85" rx="6" fill="url(#card6)" stroke="#8b5cf6" stroke-width="1" opacity="0.9"/>
        <rect x="8" y="8" width="50" height="5" rx="2" fill="#8b5cf6" opacity="0.7"/>
        <rect x="8" y="22" width="170" height="4" rx="2" fill="#c4b5fd" opacity="0.3"/>
        <rect x="8" y="32" width="140" height="4" rx="2" fill="#94a3b8" opacity="0.2"/>
        <!-- Progress bar -->
        <rect x="8" y="50" width="180" height="4" rx="2" fill="#334155"/>
        <rect x="8" y="50" width="120" height="4" rx="2" fill="#8b5cf6" opacity="0.7"/>
        <text x="8" y="70" font-family="system-ui, sans-serif" font-size="9" fill="#8b5cf6" opacity="0.5">67%</text>
        <circle cx="175" cy="70" r="10" fill="#8b5cf6" opacity="0.2"/>
        <text x="175" y="74" font-family="system-ui, sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle">JD</text>
      </g>

      <!-- Card 2 -->
      <g transform="translate(12, 153)" filter="url(#cardShadow)">
        <rect width="196" height="80" rx="6" fill="url(#card6)" stroke="#475569" stroke-width="0.5"/>
        <rect x="8" y="8" width="45" height="5" rx="2" fill="#16a34a" opacity="0.6"/>
        <rect x="8" y="22" width="155" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
        <rect x="8" y="32" width="110" height="4" rx="2" fill="#94a3b8" opacity="0.2"/>
        <!-- Progress bar -->
        <rect x="8" y="48" width="180" height="4" rx="2" fill="#334155"/>
        <rect x="8" y="48" width="80" height="4" rx="2" fill="#16a34a" opacity="0.6"/>
        <text x="8" y="68" font-family="system-ui, sans-serif" font-size="9" fill="#16a34a" opacity="0.5">44%</text>
      </g>
    </g>

    <!-- Column 3: Done -->
    <g transform="translate(480, 0)">
      <rect width="220" height="480" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <rect width="220" height="44" rx="10" fill="#334155" opacity="0.5"/>
      <rect y="34" width="220" height="10" fill="#334155" opacity="0.5"/>
      <circle cx="20" cy="22" r="5" fill="#16a34a" opacity="0.6"/>
      <text x="34" y="27" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#94a3b8" opacity="0.8">TERMINE</text>
      <text x="200" y="27" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="end">4</text>

      <!-- Card 1 -->
      <g transform="translate(12, 56)" filter="url(#cardShadow)">
        <rect width="196" height="56" rx="6" fill="url(#card6)" stroke="#475569" stroke-width="0.5" opacity="0.6"/>
        <rect x="8" y="8" width="45" height="5" rx="2" fill="#16a34a" opacity="0.4"/>
        <rect x="8" y="22" width="140" height="4" rx="2" fill="#94a3b8" opacity="0.15"/>
        <path d="M170,20 L176,28 L186,14" stroke="#16a34a" stroke-width="2" fill="none" opacity="0.5"/>
      </g>

      <!-- Card 2 -->
      <g transform="translate(12, 124)" filter="url(#cardShadow)">
        <rect width="196" height="56" rx="6" fill="url(#card6)" stroke="#475569" stroke-width="0.5" opacity="0.6"/>
        <rect x="8" y="8" width="55" height="5" rx="2" fill="#16a34a" opacity="0.4"/>
        <rect x="8" y="22" width="130" height="4" rx="2" fill="#94a3b8" opacity="0.15"/>
        <path d="M170,20 L176,28 L186,14" stroke="#16a34a" stroke-width="2" fill="none" opacity="0.5"/>
      </g>

      <!-- Card 3 -->
      <g transform="translate(12, 192)" filter="url(#cardShadow)">
        <rect width="196" height="56" rx="6" fill="url(#card6)" stroke="#475569" stroke-width="0.5" opacity="0.6"/>
        <rect x="8" y="8" width="38" height="5" rx="2" fill="#16a34a" opacity="0.4"/>
        <rect x="8" y="22" width="150" height="4" rx="2" fill="#94a3b8" opacity="0.15"/>
        <path d="M170,20 L176,28 L186,14" stroke="#16a34a" stroke-width="2" fill="none" opacity="0.5"/>
      </g>

      <!-- Card 4 -->
      <g transform="translate(12, 260)" filter="url(#cardShadow)">
        <rect width="196" height="56" rx="6" fill="url(#card6)" stroke="#475569" stroke-width="0.5" opacity="0.6"/>
        <rect x="8" y="8" width="42" height="5" rx="2" fill="#16a34a" opacity="0.4"/>
        <rect x="8" y="22" width="160" height="4" rx="2" fill="#94a3b8" opacity="0.15"/>
        <path d="M170,20 L176,28 L186,14" stroke="#16a34a" stroke-width="2" fill="none" opacity="0.5"/>
      </g>
    </g>
  </g>

  <!-- Flow arrows between columns -->
  <g filter="url(#glow6)">
    <path d="M330,300 Q350,300 360,290" stroke="#8b5cf6" stroke-width="2" fill="none" opacity="0.3" stroke-dasharray="4,4"/>
    <path d="M570,300 Q590,300 600,290" stroke="#8b5cf6" stroke-width="2" fill="none" opacity="0.3" stroke-dasharray="4,4"/>
  </g>

  <!-- Gantt chart / Timeline on the right -->
  <g transform="translate(820, 100)">
    <!-- Timeline header -->
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#8b5cf6" opacity="0.5" letter-spacing="2">TIMELINE</text>

    <!-- Timeline bars -->
    <g transform="translate(0, 20)">
      <!-- Week markers -->
      <g font-family="system-ui, sans-serif" font-size="9" fill="#64748b" opacity="0.5">
        <text x="0" y="0">S1</text>
        <text x="60" y="0">S2</text>
        <text x="120" y="0">S3</text>
        <text x="180" y="0">S4</text>
        <text x="240" y="0">S5</text>
        <text x="300" y="0">S6</text>
      </g>

      <!-- Vertical grid -->
      <g stroke="#334155" stroke-width="0.5" opacity="0.4">
        <line x1="0" y1="10" x2="0" y2="220"/>
        <line x1="60" y1="10" x2="60" y2="220"/>
        <line x1="120" y1="10" x2="120" y2="220"/>
        <line x1="180" y1="10" x2="180" y2="220"/>
        <line x1="240" y1="10" x2="240" y2="220"/>
        <line x1="300" y1="10" x2="300" y2="220"/>
      </g>

      <!-- Gantt bars -->
      <rect x="0" y="20" width="140" height="16" rx="4" fill="#8b5cf6" opacity="0.5"/>
      <rect x="60" y="48" width="180" height="16" rx="4" fill="#a78bfa" opacity="0.4"/>
      <rect x="120" y="76" width="120" height="16" rx="4" fill="#c4b5fd" opacity="0.35"/>
      <rect x="180" y="104" width="140" height="16" rx="4" fill="#8b5cf6" opacity="0.45"/>
      <rect x="0" y="132" width="100" height="16" rx="4" fill="#a78bfa" opacity="0.3"/>
      <rect x="120" y="160" width="200" height="16" rx="4" fill="#8b5cf6" opacity="0.4"/>
      <rect x="240" y="188" width="80" height="16" rx="4" fill="#16a34a" opacity="0.4"/>

      <!-- Dependencies arrows -->
      <g stroke="#8b5cf6" stroke-width="1" fill="none" opacity="0.3">
        <path d="M140,28 L150,28 L150,56 L60,56" marker-end="url(#arrowhead)"/>
        <path d="M240,56 L250,56 L250,84 L120,84" marker-end="url(#arrowhead)"/>
      </g>

      <!-- Today marker -->
      <line x1="200" y1="10" x2="200" y2="220" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
      <text x="200" y="236" font-family="system-ui, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle" opacity="0.5">Aujourd'hui</text>
    </g>
  </g>

  <!-- Milestone diamonds -->
  <g transform="translate(820, 100)" filter="url(#glow6)">
    <g transform="translate(140, 50) rotate(45)">
      <rect width="8" height="8" fill="#8b5cf6" opacity="0.7"/>
    </g>
    <g transform="translate(240, 78) rotate(45)">
      <rect width="8" height="8" fill="#a78bfa" opacity="0.6"/>
    </g>
    <g transform="translate(320, 210) rotate(45)">
      <rect width="8" height="8" fill="#16a34a" opacity="0.6"/>
    </g>
  </g>

  <!-- Floating particles -->
  <circle cx="780" cy="500" r="2" fill="#8b5cf6" opacity="0.25"/>
  <circle cx="850" cy="450" r="2.5" fill="#a78bfa" opacity="0.2"/>
  <circle cx="1100" cy="500" r="2" fill="#8b5cf6" opacity="0.15"/>
  <circle cx="950" cy="550" r="3" fill="#c4b5fd" opacity="0.12"/>

  <!-- CVpass branding -->
  <text x="1140" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#8b5cf6" opacity="0.25" text-anchor="end" letter-spacing="2">CVpass</text>
</svg>